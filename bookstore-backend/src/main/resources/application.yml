server:
  port: 8080

# 阿里云 OSS 配置
oss:
  endpoint: oss-cn-chengdu.aliyuncs.com
  access-key-id: youeraccess-key-id
  access-key-secret: youeraccess-key-secret
  bucket-name: web-mybookstore
  base-url: https://web-mybookstore.oss-cn-chengdu.aliyuncs.com

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/bookstore?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: bookstore
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  # QQ邮箱 SMTP 配置（邮箱验证码）
  mail:
    host: smtp.qq.com
    port: 587
    username: youerusername
    password: youerpassword
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.bookstore.pojo
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
